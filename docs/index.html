<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Model Selector</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">
  <div class="max-w-5xl mx-auto px-4 py-12">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-slate-900">Dynamic Model Selector</h1>
      <p class="text-slate-500 mt-1">Intelligently route your prompt to the best LLM based on task complexity, cost, and latency.</p>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
      <form id="form">
        <label class="block text-sm font-semibold text-slate-700 mb-1" for="query">Prompt / Query</label>
        <textarea id="query" rows="5"
          placeholder="Enter your prompt here — e.g. 'Can you compare Rust and Go for backend APIs?'"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"></textarea>

        <div class="flex flex-wrap gap-4 items-end">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1" for="policy">Policy</label>
            <select id="policy"
              class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="nopref">All Policies</option>
              <option value="balanced">Balanced</option>
              <option value="cost_saver">Cost Saver</option>
              <option value="quality_first">Quality First</option>
              <option value="latency_first">Latency First</option>
            </select>
          </div>

          <label class="flex items-center gap-2 cursor-pointer mb-0.5">
            <input type="checkbox" id="big3Only" checked class="h-4 w-4 accent-blue-600 rounded" />
            <span class="text-sm font-semibold text-slate-700">
              Big 3 only
              <span class="font-normal text-slate-400">(OpenAI · Anthropic · Google)</span>
            </span>
          </label>

          <button type="submit" id="submitBtn"
            class="ml-auto bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Select Model →
          </button>
        </div>
      </form>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-50 border border-red-200 rounded-2xl p-4 text-red-700 text-sm mb-6"></div>

    <!-- Results -->
    <div id="results" class="hidden space-y-6">

      <!-- Query Analysis -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Query Analysis</h2>
        <div id="analysisGrid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
        <p id="analysisReason" class="text-xs text-slate-400 italic mt-4"></p>
      </div>

      <!-- Model Recommendations -->
      <div>
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Recommended Models</h2>
        <div id="modelGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>

    </div>
  </div>

  <script>
    // TODO: replace with your deployed Render/Railway URL after deployment
    const API_URL = "http://localhost:8000";

    const form = document.getElementById("form");
    const submitBtn = document.getElementById("submitBtn");
    const resultsEl = document.getElementById("results");
    const errorEl = document.getElementById("error");
    const analysisGrid = document.getElementById("analysisGrid");
    const analysisReason = document.getElementById("analysisReason");
    const modelGrid = document.getElementById("modelGrid");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const query = document.getElementById("query").value.trim();
      if (!query) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Selecting…";
      errorEl.classList.add("hidden");
      resultsEl.classList.add("hidden");

      try {
        const resp = await fetch(`${API_URL}/select`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            policy: document.getElementById("policy").value,
            big3_only: document.getElementById("big3Only").checked,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail ?? `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        render(data);
      } catch (err) {
        errorEl.textContent = `Error: ${err.message}`;
        errorEl.classList.remove("hidden");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Select Model →";
      }
    });

    function render({ selection, result }) {
      renderAnalysis(selection);
      renderModels(result, document.getElementById("policy").value);
      resultsEl.classList.remove("hidden");
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function chip(label, value, extra = "") {
      return `
        <div class="rounded-xl bg-slate-100 px-3 py-2 ${extra}">
          <div class="text-xs text-slate-400 mb-0.5">${label}</div>
          <div class="font-semibold text-sm text-slate-800">${value}</div>
        </div>`;
    }

    function renderAnalysis(sel) {
      const effortBadge = sel.requires_reasoning
        ? `<span class="inline-block bg-amber-100 text-amber-700 rounded-md px-1.5 py-0.5 text-xs font-medium">${sel.reasoning_effort}</span>`
        : `<span class="text-slate-400 text-sm">none</span>`;

      analysisGrid.innerHTML = [
        chip("Task Family", sel.task_family.replace(/_/g, " ")),
        chip("Difficulty", `${sel.difficulty_score} / 100`),
        chip("Reasoning", effortBadge),
        chip("Tokens", sel.token_count.toLocaleString()),
        chip("Has Code", sel.has_code ? "✓ yes" : "✗ no"),
        chip("Stacktrace", sel.has_stacktrace ? "✓ yes" : "✗ no"),
        chip("Wants Analysis", sel.asks_for_analysis ? "✓ yes" : "✗ no"),
        chip("Structured Data", sel.has_structured_data ? "✓ yes" : "✗ no"),
      ].join("");

      analysisReason.textContent = `Routing reason: ${sel.reason}`;
    }

    const POLICY_META = {
      balanced:      { label: "Balanced",      ring: "ring-blue-300",   bg: "bg-blue-50",   header: "bg-blue-100 text-blue-700" },
      cost_saver:    { label: "Cost Saver",     ring: "ring-green-300",  bg: "bg-green-50",  header: "bg-green-100 text-green-700" },
      quality_first: { label: "Quality First",  ring: "ring-purple-300", bg: "bg-purple-50", header: "bg-purple-100 text-purple-700" },
      latency_first: { label: "Latency First",  ring: "ring-orange-300", bg: "bg-orange-50", header: "bg-orange-100 text-orange-700" },
    };

    function modelCard(policy, model) {
      const { candidate: c, score, benchmark_used, reason } = model;
      const meta = POLICY_META[policy] ?? { label: policy, ring: "ring-slate-200", bg: "bg-slate-50", header: "bg-slate-100 text-slate-600" };

      return `
        <div class="rounded-2xl ring-2 ${meta.ring} ${meta.bg} p-5 flex flex-col gap-3">
          <div>
            <span class="inline-block rounded-lg px-2 py-0.5 text-xs font-semibold ${meta.header} mb-2">${meta.label}</span>
            <div class="font-bold text-base text-slate-900 leading-tight">${c.name}</div>
            <div class="text-sm text-slate-500">${c.provider}</div>
          </div>

          <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-white rounded-xl py-2 px-1 shadow-sm">
              <div class="text-xs text-slate-400">Score</div>
              <div class="font-bold text-slate-900">${score.toFixed(1)}</div>
              <div class="text-xs text-slate-400">${benchmark_used.replace("_index", "")}</div>
            </div>
            <div class="bg-white rounded-xl py-2 px-1 shadow-sm">
              <div class="text-xs text-slate-400">Cost / 1M</div>
              <div class="font-bold text-slate-900">$${c.blended_cost_per_1m != null ? c.blended_cost_per_1m.toFixed(3) : "—"}</div>
            </div>
            <div class="bg-white rounded-xl py-2 px-1 shadow-sm">
              <div class="text-xs text-slate-400">TTFT</div>
              <div class="font-bold text-slate-900">${c.time_to_first_token_seconds != null ? c.time_to_first_token_seconds.toFixed(2) + "s" : "—"}</div>
            </div>
          </div>

          <p class="text-xs text-slate-500 italic leading-relaxed">${reason}</p>
        </div>`;
    }

    function renderModels(result, selectedPolicy) {
      // nopref → result has keys: balanced, cost_saver, quality_first, latency_first
      if (result.balanced !== undefined) {
        modelGrid.className = "grid grid-cols-1 sm:grid-cols-2 gap-4";
        modelGrid.innerHTML = Object.entries(result)
          .map(([policy, model]) => modelCard(policy, model))
          .join("");
      } else {
        // specific policy → single ResolvedModel
        modelGrid.className = "grid grid-cols-1 max-w-sm gap-4";
        modelGrid.innerHTML = modelCard(selectedPolicy, result);
      }
    }
  </script>
</body>
</html>
